# Reusable build workflow: compiles whitenoise-linux for every supported
# platform (Linux x86_64/arm64, macOS arm64). Called by ci.yml (release build,
# no artifacts) and release.yml (release build, uploads artifacts).
# (FreeBSD x86_64 and Intel-macOS x86_64 builds temporarily disabled.)
#
# Both callers build with `--release --no-default-features`: that drops the
# default `live-reload` feature so the binary embeds the statically compiled
# Slint UI (the interpreter/live-reload path is dev-only — see wnl-ui/build.rs).
# A debug build (`release: false`) would instead produce the interpreter shim,
# which is not shippable and depends on ui/*.slint at its build-time path.
#
# The marmot crates are a public https git dependency
# (https://github.com/marmot-protocol/darkmatter.git), so cargo fetches them
# anonymously — no secrets or ssh-agent setup required.
name: build

on:
  workflow_call:
    inputs:
      release:
        description: "Build with --release --no-default-features (compiled UI). When false, builds the dev debug/interpreter shim."
        type: boolean
        default: false
      package:
        description: "Tar the release binary and upload it as an artifact (requires release: true). CI leaves this off to build without publishing."
        type: boolean
        default: false

jobs:
  # Native runners: one per OS/arch. arm64 Linux uses GitHub's native arm
  # runners and macOS arm64 uses the Apple-silicon image, so every job builds
  # natively — no cross-compilation sysroot wrangling for the C deps (libmpv,
  # ALSA, fontconfig).
  native:
    name: build (${{ matrix.triple }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     triple: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu }
          - { os: macos-14,         triple: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libmpv-dev libfontconfig-dev libasound2-dev libdbus-1-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: |
          brew install mpv pkgconf
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      # cache-on-failure keeps the opt-level-3 dependency build warm even when a
      # build fails, so the next push doesn't recompile the dep tree from cold.
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.triple }}
          cache-on-failure: true

      # rust-cache (above) cleans workspace-member artifacts before saving, so
      # the ~580k-line generated wnl-ui Slint crate (the compiled UI these
      # release builds embed; tens of seconds to compile) recompiles every run.
      # This content-addressed cache restores it directly. Keyed on
      # everything that changes its output — UI/lang/wnl-ui sources, locked dep
      # ABIs, toolchain, plus the triple and profile (release vs debug artifacts
      # differ). Defined AFTER rust-cache so its restore overlays target/ and its
      # save runs before rust-cache cleans the workspace crates.
      - name: Record toolchain version
        shell: bash
        run: echo "RUSTC_VER=$(rustc -V | tr ' .()' '----')" >> "$GITHUB_ENV"
      - name: Cache compiled wnl-ui (Slint UI) crate
        uses: actions/cache@v4
        with:
          path: |
            target/${{ inputs.release && 'release' || 'debug' }}/build/wnl-ui-*
            target/${{ inputs.release && 'release' || 'debug' }}/deps/libwnl_ui-*
            target/${{ inputs.release && 'release' || 'debug' }}/deps/wnl_ui-*
            target/${{ inputs.release && 'release' || 'debug' }}/.fingerprint/wnl-ui-*
          key: wnlui-${{ matrix.triple }}-${{ inputs.release && 'rel' || 'dev' }}-${{ env.RUSTC_VER }}-${{ hashFiles('ui/**', 'lang/**', 'wnl-ui/**', 'Cargo.lock') }}

      - name: Build
        run: cargo build --locked ${{ inputs.release && '--release --no-default-features' || '' }}

      - name: Package
        if: inputs.package
        shell: bash
        run: |
          dist="whitenoise-linux-${{ matrix.triple }}"
          mkdir -p "$dist"
          cp "target/release/whitenoise-linux" "$dist/"
          cp README.md AGENTS.md "$dist/" 2>/dev/null || true
          tar -czf "$dist.tar.gz" "$dist"

      - uses: actions/upload-artifact@v4
        if: inputs.package
        with:
          name: whitenoise-linux-${{ matrix.triple }}
          path: whitenoise-linux-${{ matrix.triple }}.tar.gz
          if-no-files-found: error
