pixel-metrics = false
outline-surfaces = true
soft-decor = true
skin-message = 0
skin-button = 0
skin-list = 0
skin-avatar = 0
skin-modal = 0
bracket-labels = false
paper-doodles = true
sketch-bubbles = true
synth-grid = false

font = "JetBrains Mono"
r-scale = 1.0
border-w = 1.0
hover-dur = 100
transition-dur = 120
